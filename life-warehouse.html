<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>生活仓库 - Frieren</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
  <style>/**
 * Frieren 共享全局样式系统
 * 所有子项目统一引用此样式，实现一体化视觉效果
 */

/* ========== CSS 变量 ========== */
:root {
  /* 主题色 */
  --primary: #9B7EBD;
  --primary-light: #B794F6;
  --primary-dark: #7c5ce0;
  --accent: #e056fd;
  --accent-cyan: #00d9ff;
  
  /* 背景 */
  --bg-dark: #0a0a0f;
  --bg-card: #1a1a24;
  --bg-card-hover: #2a2a3a;
  --bg-gradient: radial-gradient(ellipse at top, #1a1a2e 0%, var(--bg-dark) 70%);
  
  /* 文字 */
  --text-primary: #fff;
  --text-secondary: #aaa;
  --text-muted: #666;
  
  /* 边框 */
  --border-color: #2a2a3a;
  --border-glow: rgba(155, 126, 189, 0.3);
  
  /* 阴影 */
  --shadow-card: 0 8px 32px rgba(0, 0, 0, 0.3);
  --shadow-glow: 0 0 40px rgba(155, 126, 189, 0.15);
  
  /* 圆角 */
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 20px;
  
  /* 字体 */
  --font-family: 'Outfit', -apple-system, 'Noto Sans SC', sans-serif;
}

/* ========== 全局重置 ========== */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: var(--font-family);
  background: var(--bg-dark);
  background-image: var(--bg-gradient);
  color: var(--text-primary);
  min-height: 100vh;
  line-height: 1.6;
}

a {
  color: var(--accent);
  text-decoration: none;
  transition: color 0.2s ease;
}

a:hover {
  color: var(--primary-light);
}

/* ========== 布局容器 ========== */
.frieren-container {
  /* max-width: 800px; */
  margin: 0 auto;
  padding: 40px;
}

/* ========== 导航栏 ========== */
.frieren-nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 20px;
  /* background: var(--bg-card); */
  border-radius: var(--radius-lg);
  margin-bottom: 24px;
  /* border: 1px solid var(--border-color); */
}

.frieren-nav .brand {
  display: flex;
  align-items: center;
  gap: 10px;
}

.frieren-nav .brand-icon {
  width: 32px;
  height: 32px;
  background: linear-gradient(135deg, var(--primary) 0%, var(--accent-cyan) 100%);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  box-shadow: 0 4px 12px rgba(155, 126, 189, 0.3);
}

.frieren-nav .brand-name {
  font-size: 1.2rem;
  font-weight: 700;
  background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.frieren-nav .nav-links {
  display: flex;
  gap: 8px;
}

.frieren-nav .nav-link {
  padding: 8px 14px;
  border-radius: var(--radius-sm);
  color: var(--text-secondary);
  font-size: 0.9rem;
  transition: all 0.2s ease;
}

.frieren-nav .nav-link:hover,
.frieren-nav .nav-link.active {
  background: rgba(155, 126, 189, 0.15);
  color: var(--primary);
}

/* ========== 面包屑 ========== */
.frieren-breadcrumb {
  color: var(--text-muted);
  font-size: 0.85rem;
  padding: 12px 16px;
  background: var(--bg-card);
  border-radius: var(--radius-md);
  margin-bottom: 20px;
  border: 1px solid var(--border-color);
}

.frieren-breadcrumb a {
  color: var(--primary);
}

.frieren-breadcrumb a:hover {
  color: var(--accent);
}

.frieren-breadcrumb .current {
  color: var(--text-primary);
}

/* ========== 页面标题 ========== */
.frieren-header {
  text-align: center;
  margin-bottom: 30px;
}

.frieren-header h1 {
  font-size: 2.2rem;
  background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  letter-spacing: 2px;
  margin-bottom: 8px;
}

.frieren-header .subtitle {
  color: var(--text-muted);
  font-size: 1rem;
}

/* ========== 卡片 ========== */
.frieren-card {
  background: linear-gradient(145deg, #1e1e2a, #16161f);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-card);
  border: 1px solid var(--border-color);
  transition: all 0.3s ease;
}

.frieren-card:hover {
  transform: translateY(-4px);
  border-color: var(--border-glow);
  box-shadow: var(--shadow-card), var(--shadow-glow);
}

/* ========== 按钮 ========== */
.frieren-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 12px 24px;
  border-radius: var(--radius-md);
  font-size: 1rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.3s ease;
  border: none;
  text-decoration: none;
}

.frieren-btn-primary {
  background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
  color: white;
  box-shadow: 0 4px 16px rgba(155, 126, 189, 0.3);
}

.frieren-btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 24px rgba(155, 126, 189, 0.4);
}

.frieren-btn-secondary {
  background: rgba(255, 255, 255, 0.05);
  color: var(--text-primary);
  border: 1px solid var(--border-color);
}

.frieren-btn-secondary:hover {
  background: rgba(255, 255, 255, 0.1);
}

/* ========== 标签 ========== */
.frieren-tag {
  display: inline-block;
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 0.75rem;
  background: rgba(155, 126, 189, 0.2);
  color: var(--primary);
  border: 1px solid rgba(155, 126, 189, 0.3);
}

.frieren-tag-new {
  background: rgba(34, 197, 94, 0.2);
  color: #22c55e;
  border-color: rgba(34, 197, 94, 0.3);
}

/* ========== 统计卡片 ========== */
.frieren-stat {
  background: var(--bg-card);
  border-radius: var(--radius-md);
  padding: 16px;
  text-align: center;
  border: 1px solid var(--border-color);
  transition: all 0.2s ease;
}

.frieren-stat:hover {
  background: var(--bg-card-hover);
}

.frieren-stat .value {
  font-size: 1.5rem;
  font-weight: 700;
  background: linear-gradient(135deg, var(--primary) 0%, var(--accent-cyan) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.frieren-stat .label {
  font-size: 0.8rem;
  color: var(--text-muted);
  margin-top: 4px;
}

/* ========== 列表 ========== */
.frieren-list {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.frieren-list-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 16px;
  background: var(--bg-card);
  border-radius: var(--radius-md);
  border: 1px solid var(--border-color);
  transition: all 0.2s ease;
}

.frieren-list-item:hover {
  background: var(--bg-card-hover);
  border-color: var(--border-glow);
}

/* ========== 表格 ========== */
.frieren-table {
  width: 100%;
  border-collapse: collapse;
}

.frieren-table th,
.frieren-table td {
  padding: 12px;
  text-align: left;
  border-bottom: 1px solid var(--border-color);
}

.frieren-table th {
  background: linear-gradient(90deg, rgba(155, 126, 189, 0.1), transparent);
  color: var(--primary);
  font-weight: 600;
}

.frieren-table tr:hover td {
  background: rgba(255, 255, 255, 0.02);
}

/* ========== 底部 ========== */
.frieren-footer {
  text-align: center;
  padding: 30px;
  margin-top: 40px;
  color: var(--text-muted);
  font-size: 0.85rem;
  border-top: 1px solid var(--border-color);
}

.frieren-footer .made-with {
  margin-top: 8px;
  font-size: 0.8rem;
}

/* ========== 模块主题色变量（各模块在 extraCss 中 override） ========== */
/*
 * 使用方法：在模块 build.js 的 extraCss 开头加：
 *   :root { --module-accent: #00d9ff; --module-accent-rgb: 0, 217, 255;
 *           --module-accent-2: #8b5cf6; --module-accent-2-rgb: 139, 92, 246; }
 */
:root {
  --module-accent: var(--accent-cyan);
  --module-accent-rgb: 0, 217, 255;
  --module-accent-2: var(--primary-dark);
  --module-accent-2-rgb: 139, 92, 246;
}

/* ========== 统计卡片网格 ========== */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 16px;
  margin-bottom: 28px;
}

.stat-card {
  position: relative;
  background: linear-gradient(145deg, #1e1e2e, #16213e);
  border-radius: 18px;
  padding: 20px;
  border: 1px solid rgba(var(--module-accent-rgb), 0.15);
  overflow: hidden;
  transition: all 0.3s ease;
}

.stat-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg,
    rgba(var(--module-accent-rgb), 0.3),
    rgba(var(--module-accent-2-rgb), 0.3));
  opacity: 0.6;
}

.stat-card:hover {
  transform: translateY(-4px);
  border-color: rgba(var(--module-accent-rgb), 0.3);
  box-shadow: 0 8px 24px rgba(var(--module-accent-rgb), 0.2);
}

.stat-card.total {
  grid-column: span 2;
  background: linear-gradient(135deg,
    rgba(var(--module-accent-rgb), 0.2),
    rgba(var(--module-accent-2-rgb), 0.1));
  border-color: rgba(var(--module-accent-rgb), 0.3);
  padding: 24px;
}

.stat-card.total::before {
  background: linear-gradient(90deg, var(--module-accent), var(--module-accent-2), var(--module-accent));
  opacity: 1;
}

.stat-card .stat-icon {
  position: absolute;
  top: 12px; right: 12px;
  font-size: 1.5rem;
  opacity: 0.4;
}

.stat-card .stat-label {
  font-size: 0.85rem;
  color: var(--module-accent);
  margin-bottom: 8px;
}

.stat-card .stat-value {
  font-size: 1.8rem;
  font-weight: 700;
  background: linear-gradient(135deg, #fff, var(--module-accent));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.stat-card.total .stat-value { font-size: 2.5rem; }

.stat-card .stat-meta {
  font-size: 0.75rem;
  color: #94a3b8;
  margin-top: 8px;
}

.stat-card .stat-change {
  font-size: 0.8rem;
  padding: 4px 12px;
  border-radius: 12px;
  margin-top: 8px;
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-weight: 500;
}

.stat-card .stat-change.up {
  background: rgba(239, 68, 68, 0.15);
  color: #f87171;
  border: 1px solid rgba(239, 68, 68, 0.2);
}

.stat-card .stat-change.down {
  background: rgba(34, 197, 94, 0.15);
  color: #4ade80;
  border: 1px solid rgba(34, 197, 94, 0.2);
}

/* ========== 筛选标签栏 ========== */
.filter-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 24px;
  flex-wrap: wrap;
  gap: 16px;
}

.filter-tabs {
  display: flex;
  gap: 6px;
  background: linear-gradient(145deg, #1e1e2e, #16213e);
  padding: 6px;
  border-radius: 16px;
  border: 1px solid rgba(var(--module-accent-rgb), 0.15);
  flex-wrap: wrap;
}

.filter-tab {
  padding: 10px 18px;
  border: none;
  background: transparent;
  color: #94a3b8;
  font-size: 0.9rem;
  cursor: pointer;
  border-radius: 12px;
  transition: all 0.3s ease;
  font-weight: 500;
}

.filter-tab:hover {
  color: #e0e7ff;
  background: rgba(var(--module-accent-rgb), 0.1);
}

.filter-tab.active {
  background: linear-gradient(135deg, var(--module-accent), var(--module-accent-2));
  color: #fff;
  box-shadow: 0 4px 12px rgba(var(--module-accent-rgb), 0.3);
}

/* 紧凑型筛选按钮组（多维度筛选场景） */
.filter-group {
  display: flex;
  gap: 4px;
  background: linear-gradient(145deg, #1e1e2e, #16213e);
  padding: 4px;
  border-radius: 12px;
  border: 1px solid rgba(var(--module-accent-rgb), 0.15);
  flex-wrap: wrap;
}

.filter-btn {
  padding: 8px 12px;
  border: none;
  background: transparent;
  color: #94a3b8;
  font-size: 0.75rem;
  cursor: pointer;
  border-radius: 8px;
  transition: all 0.3s ease;
  white-space: nowrap;
}

.filter-btn:hover {
  color: #e0e7ff;
  background: rgba(var(--module-accent-rgb), 0.1);
}

.filter-btn.active {
  background: linear-gradient(135deg, var(--module-accent), var(--module-accent-2));
  color: #fff;
  box-shadow: 0 4px 12px rgba(var(--module-accent-rgb), 0.3);
}

/* ========== 搜索框 ========== */
.search-box {
  display: flex;
  align-items: center;
  gap: 8px;
  background: linear-gradient(145deg, #1e1e2e, #16213e);
  padding: 10px 16px;
  border-radius: 16px;
  border: 1px solid rgba(var(--module-accent-rgb), 0.15);
}

.search-box input {
  background: transparent;
  border: none;
  color: #e0e7ff;
  font-size: 0.9rem;
  width: 200px;
  outline: none;
}

.search-box input::placeholder { color: #64748b; }

/* ========== 图表网格 ========== */
.charts-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 20px;
  margin-bottom: 28px;
}

.chart-card {
  position: relative;
  background: linear-gradient(145deg, #1e1e2e, #16213e);
  border-radius: 20px;
  padding: 24px;
  border: 1px solid rgba(var(--module-accent-rgb), 0.15);
  overflow: hidden;
}

.chart-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg,
    rgba(var(--module-accent-rgb), 0.3),
    rgba(var(--module-accent-2-rgb), 0.3));
}

.chart-card h3 {
  font-size: 1.1rem;
  font-weight: 600;
  margin-bottom: 16px;
  color: #fff;
  display: flex;
  align-items: center;
  gap: 8px;
}

.chart-card h3::before {
  content: '✦';
  color: var(--module-accent);
  font-size: 0.9em;
}

.chart-container { height: 280px; }

/* ========== 模块页头（可复用模板） ========== */
/*
 * 用法：<div class="module-header">
 *         <div class="module-title"><span class="sparkle">✨</span><h1>标题</h1></div>
 *       </div>
 */
.module-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 28px;
  padding: 20px 24px;
  background: linear-gradient(135deg,
    rgba(var(--module-accent-rgb), 0.12),
    rgba(var(--module-accent-2-rgb), 0.08));
  border-radius: 20px;
  border: 1px solid rgba(var(--module-accent-rgb), 0.2);
  position: relative;
  overflow: hidden;
}

.module-header::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg,
    transparent, var(--module-accent),
    var(--module-accent-2), var(--module-accent), transparent);
}

.module-title {
  display: flex;
  align-items: center;
  gap: 12px;
}

.module-title h1 {
  font-size: 1.6rem;
  font-weight: 600;
  background: linear-gradient(135deg, var(--module-accent), var(--module-accent-2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin: 0;
}

.module-title .sparkle {
  font-size: 1.5rem;
  animation: twinkle 2s ease-in-out infinite;
}

/* ========== 内容面板（带顶部渐变线） ========== */
/*
 * 用法：<div class="module-section">
 *         <h3>标题</h3>
 *         <div class="section-scroll">... 可滚动内容 ...</div>
 *       </div>
 */
.module-section {
  position: relative;
  background: linear-gradient(145deg, #1e1e2e, #16213e);
  border-radius: 20px;
  padding: 24px;
  border: 1px solid rgba(var(--module-accent-rgb), 0.15);
  overflow: hidden;
  margin-bottom: 28px;
}

.module-section::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg,
    rgba(var(--module-accent-rgb), 0.3),
    rgba(var(--module-accent-2-rgb), 0.3));
}

.module-section > h3 {
  font-size: 1.1rem;
  font-weight: 600;
  margin-bottom: 16px;
  color: #fff;
  display: flex;
  align-items: center;
  gap: 8px;
}

.module-section > h3::before {
  content: '✦';
  color: var(--module-accent);
  font-size: 0.9em;
}

.section-scroll {
  max-height: 400px;
  overflow-y: auto;
}

/* ========== 通用列表项 ========== */
/*
 * 用法：<div class="list-item">
 *         <span class="list-item-icon">🎯</span>
 *         <div class="list-item-body">...</div>
 *         <div class="list-item-side">...</div>
 *       </div>
 */
.list-item {
  display: flex;
  align-items: center;
  padding: 16px;
  margin-bottom: 12px;
  background: rgba(30, 30, 46, 0.4);
  border-radius: 14px;
  border: 1px solid rgba(var(--module-accent-rgb), 0.1);
  transition: all 0.3s ease;
}

.list-item:hover {
  background: rgba(var(--module-accent-rgb), 0.1);
  border-color: rgba(var(--module-accent-rgb), 0.2);
  transform: translateX(4px);
}

.list-item-icon {
  font-size: 1.8rem;
  margin-right: 14px;
}

.list-item-body { flex: 1; }

.list-item-title {
  font-size: 0.95rem;
  font-weight: 600;
  color: #e0e7ff;
  margin-bottom: 4px;
}

.list-item-meta {
  font-size: 0.8rem;
  color: #94a3b8;
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}

.list-item-value {
  font-size: 1.1rem;
  font-weight: 700;
  background: linear-gradient(135deg, var(--module-accent), var(--module-accent-2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* ========== 空状态 ========== */
.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: #64748b;
}

.empty-state .empty-icon {
  font-size: 3rem;
  margin-bottom: 16px;
  opacity: 0.5;
}

/* ========== 动画 ========== */
@keyframes twinkle {
  0%, 100% { opacity: 0.6; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.2); }
}

/* ========== 自定义滚动条 ========== */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: rgba(30, 30, 46, 0.4); }
::-webkit-scrollbar-thumb {
  background: rgba(var(--module-accent-rgb), 0.3);
  border-radius: 3px;
}

/* ========== 响应式（模块级通用） ========== */
@media (max-width: 768px) {
  .charts-grid { grid-template-columns: 1fr; }
  .stats-grid { grid-template-columns: repeat(2, 1fr); }
  .stat-card.total { grid-column: span 2; }
  .filter-bar { flex-direction: column; align-items: flex-start; }
  .search-box { width: 100%; }
  .search-box input { width: 100%; }
}

/* ========== 工具类 ========== */
.text-center { text-align: center; }
.text-muted { color: var(--text-muted); }
.mt-2 { margin-top: 8px; }
.mt-4 { margin-top: 16px; }
.mt-6 { margin-top: 24px; }
.mb-2 { margin-bottom: 8px; }
.mb-4 { margin-bottom: 16px; }
.mb-6 { margin-bottom: 24px; }
.flex { display: flex; }
.flex-center { display: flex; align-items: center; justify-content: center; }
.gap-2 { gap: 8px; }
.gap-4 { gap: 16px; }
.grid { display: grid; }
.grid-2 { grid-template-columns: repeat(2, 1fr); }
.grid-4 { grid-template-columns: repeat(4, 1fr); }

/* ========== 响应式 ========== */
@media (max-width: 768px) {
  .frieren-nav {
    flex-direction: column;
    gap: 12px;
  }
  
  .frieren-nav .nav-links {
    flex-wrap: wrap;
    justify-content: center;
  }
  
  .frieren-header h1 {
    font-size: 1.8rem;
  }
  
  .grid-4 {
    grid-template-columns: repeat(2, 1fr);
  }

<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<script>
// D 由 build.js 在构建时从 data/items.json + data/categories.json 注入
var currentCat='all',searchText='';
var pieChart,locChart;

function getCatIcon(name){var c=D.categories.find(function(x){return x.name===name});return c?c.icon:'📦'}
function getCatColor(name){var c=D.categories.find(function(x){return x.name===name});return c?c.color:'#8b5cf6'}

function initTabs(){
  var tabs=document.getElementById('category-tabs');
  D.categories.forEach(function(c){
    var btn=document.createElement('button');
    btn.className='filter-tab';
    btn.setAttribute('data-cat',c.name);
    btn.textContent=c.icon+' '+c.name;
    btn.onclick=function(){
      document.querySelectorAll('.filter-tab').forEach(function(t){t.classList.remove('active')});
      this.classList.add('active');
      currentCat=this.getAttribute('data-cat');
      render();
    };
    tabs.appendChild(btn);
  });
}

function calcStats(){
  var items=D.items;
  if(currentCat!=='all')items=items.filter(function(i){return i.category===currentCat});
  if(searchText)items=items.filter(function(i){return i.name.toLowerCase().includes(searchText.toLowerCase())});
  var total=0,totalQty=0,catCount=0,locCount=0,ownerCount=0;
  var cats={},locs={},owners={};
  items.forEach(function(i){
    total+=i.price*i.quantity;
    totalQty+=i.quantity;
    cats[i.category]=(cats[i.category]||0)+1;
    locs[i.location]=(locs[i.location]||0)+1;
    owners[i.owner]=(owners[i.owner]||0)+1;
  });
  catCount=Object.keys(cats).length;
  locCount=Object.keys(locs).length;
  ownerCount=Object.keys(owners).length;
  return{total:total,qty:totalQty,catCount:catCount,locCount:locCount,ownerCount:ownerCount,cats:cats,locs:locs};
}

function render(){
  var s=calcStats();
  document.getElementById('ta').textContent='¥'+s.total.toLocaleString();
  document.getElementById('rc').textContent='共 '+s.qty+' 件物品';
  document.getElementById('tc').textContent=s.qty;
  document.getElementById('cc').textContent=s.catCount;
  document.getElementById('lc').textContent=s.locCount;
  document.getElementById('oc').textContent=s.ownerCount;

  var pieData=Object.keys(s.cats).map(function(k){
    return{name:k,value:s.cats[k],itemStyle:{color:getCatColor(k)}};
  });
  pieChart.setOption({series:[{data:pieData}]});

  var locData=Object.keys(s.locs).map(function(k){return{name:k,value:s.locs[k]};});
  locChart.setOption({series:[{data:locData}]});

  var items=D.items;
  if(currentCat!=='all')items=items.filter(function(i){return i.category===currentCat});
  if(searchText)items=items.filter(function(i){return i.name.toLowerCase().includes(searchText.toLowerCase())});
  items.sort(function(a,b){return b.price*a.quantity-a.price*b.quantity});

  var html='';
  items.forEach(function(i){
    var icon=getCatIcon(i.category);
    html+='<div class="item-card"><span class="item-icon">'+icon+'</span><div class="item-info"><div class="item-name">'+i.name+'</div><div class="item-meta"><span class="item-location">📍 '+i.location+'</span><span>×'+i.quantity+'</span><span>👤 '+i.owner+'</span></div></div><div class="item-price">¥'+(i.price*i.quantity).toLocaleString()+'</div></div>';
  });
  document.getElementById('items-container').innerHTML=html||'<div class="empty-state"><div class="empty-icon">📭</div><div>暂无物品</div></div>';
}

document.getElementById('search').addEventListener('input',function(e){
  searchText=e.target.value;
  render();
});

pieChart=echarts.init(document.getElementById('pie-chart'));
locChart=echarts.init(document.getElementById('location-chart'));

pieChart.setOption({
  backgroundColor:'transparent',
  tooltip:{trigger:'item',formatter:'{b}: {c}件 ({d}%)',backgroundColor:'rgba(30,30,46,0.95)',borderColor:'rgba(0,217,255,0.3)',textStyle:{color:'#e0e7ff'}},
  series:[{type:'pie',radius:['45%','75%'],center:['50%','50%'],data:[],label:{color:'#e0e7ff',fontSize:11,formatter:'{b}\n{d}%'},labelLine:{lineStyle:{color:'rgba(0,217,255,0.5)'}}}]
});

locChart.setOption({
  backgroundColor:'transparent',
  tooltip:{trigger:'item',formatter:'{b}: {c}件',backgroundColor:'rgba(30,30,46,0.95)',borderColor:'rgba(0,217,255,0.3)',textStyle:{color:'#e0e7ff'}},
  series:[{type:'pie',radius:['45%','75%'],center:['50%','50%'],data:[],label:{color:'#e0e7ff',fontSize:11,formatter:'{b}: {c}'},labelLine:{lineStyle:{color:'rgba(0,217,255,0.5)'}}}]
});

initTabs();
render();
window.addEventListener('resize',function(){pieChart.resize();locChart.resize();});
</script>

(function() {
  // ========== 滚动进度条 ==========
  const progressBar = document.getElementById('frieren-scroll-progress');
  if (progressBar) {
    window.addEventListener('scroll', function() {
      const winScroll = document.body.scrollTop || document.documentElement.scrollTop;
      const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
      const scrolled = (winScroll / height) * 100;
      progressBar.style.width = scrolled + '%';
    });
  }
  
  // ========== 粒子效果 ==========
  var canvas = document.getElementById('frieren-particles');
  if (!canvas) return;
  
  var ctx = canvas.getContext('2d');
  var particles = [];
  var animationId;
  
  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  
  function createParticles() {
    particles = [];
    for (var i = 0; i < 50; i++) {
      particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        vx: (Math.random() - 0.5) * 0.3,
        vy: (Math.random() - 0.5) * 0.3,
        radius: Math.random() * 2 + 1,
        opacity: Math.random() * 0.4 + 0.2
      });
    }
  }
  
  function drawParticles() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    particles.forEach(function(p, i) {
      p.x += p.vx;
      p.y += p.vy;
      
      if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
      if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
      
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(155, 126, 189, ' + p.opacity + ')';
      ctx.fill();
      
      // 连线
      particles.slice(i + 1).forEach(function(p2) {
        var dx = p.x - p2.x;
        var dy = p.y - p2.y;
        var distance = Math.sqrt(dx * dx + dy * dy);
        
        if (distance < 120) {
          ctx.beginPath();
          ctx.strokeStyle = 'rgba(155, 126, 189, ' + (1 - distance / 120) * 0.15 + ')';
          ctx.lineWidth = 1;
          ctx.moveTo(p.x, p.y);
          ctx.lineTo(p2.x, p2.y);
          ctx.stroke();
        }
      });
    });
    
    animationId = requestAnimationFrame(drawParticles);
  }
  
  // 初始化
  resize();
  createParticles();
  drawParticles();
  
  window.addEventListener('resize', function() {
    resize();
    createParticles();
  });
  
  // 减少动画
  var prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  if (prefersReducedMotion) {
    if (animationId) cancelAnimationFrame(animationId);
  }
})();
</script></body>
